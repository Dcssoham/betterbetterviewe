<!-- index.html (modified) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adult Video Search</title>

<!-- HLS.js for HLS playback support -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: #fff;
}

header {
    padding: 20px;
    text-align: center;
    background: #000;
}

input, button {
    padding: 12px;
    font-size: 16px;
}

button {
    background: #ff9000;
    border: none;
    color: #fff;
    cursor: pointer;
}

button:hover {
    background: #e67e00;
}

.results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
}

.video-card {
    background: #1f1f1f;
    cursor: pointer;
    transition: transform 0.2s;
}

.video-card:hover {
    transform: scale(1.03);
}

.video-card img {
    width: 100%;
}

.video-info {
    padding: 10px;
    font-size: 14px;
}

.load-more {
    width: 90%;
    margin: 20px auto;
    display: block;
}

/* Video Modal */
#videoModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

#videoModal video {
    max-width: 95%;
    max-height: 95%;
    background: #000;
    border-radius: 8px;
}

#closeModal {
    position: absolute;
    top: 20px;
    right: 30px;
    background: #ff0000;
    color: #fff;
    border: none;
    padding: 10px 15px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 50%;
    z-index: 1001;
}

#closeModal:hover {
    background: #cc0000;
}

#videoLoading {
    color: #ff9000;
    font-size: 18px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<header>
    <h1>Adult Video Search</h1>
    <input id="searchInput" placeholder="Search videos">
    <button onclick="startSearch()">Search</button>
</header>

<div id="results" class="results"></div>
<button id="loadMore" class="load-more" onclick="loadMore()" style="display: none;">Load More</button>

<!-- Video Player Modal -->
<div id="videoModal">
    <button id="closeModal" onclick="closeModal()">✕</button>
    <div id="videoLoading">Loading video...</div>
    <video id="videoPlayer" controls preload="metadata" poster="" style="display: none;"></video>
</div>

<script>
let searchTerm = '';
let filterType = 'relevance';
let currentPage = 1;
let loadedVideoIds = new Set();
let currentHls = null;

function startSearch() {
    searchTerm = document.getElementById('searchInput').value.trim();
    currentPage = 1;
    loadedVideoIds.clear();
    document.getElementById('results').innerHTML = '';
    document.getElementById('loadMore').style.display = 'none';
    if (searchTerm) {
        fetchResults();
    }
}

function loadMore() {
    currentPage++;
    fetchResults();
}

function fetchResults() {
    fetch('/load_more', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            search_term: searchTerm,
            filter_type: filterType,
            page: currentPage,
            seen_ids: Array.from(loadedVideoIds)
        })
    })
    .then(res => res.json())
    .then(data => renderResults(data.results));
}

function renderResults(videos) {
    const container = document.getElementById('results');

    if (!videos || videos.length === 0) {
        if (currentPage === 1) {
            container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">No videos found.</p>';
        }
        document.getElementById('loadMore').style.display = 'none';
        return;
    }

    videos.forEach(v => {
        if (loadedVideoIds.has(v.video_id)) return;
        loadedVideoIds.add(v.video_id);

        const div = document.createElement('div');
        div.className = 'video-card';
        div.onclick = () => playVideo(v.video_id, v.thumbnail, v.title);

        div.innerHTML = `
            <img src="${v.thumbnail}" loading="lazy" alt="${v.title}">
            <div class="video-info">
                <div>${v.title}</div>
                <div>${v.duration} | ${v.views || 'N/A'}</div>
            </div>
        `;

        container.appendChild(div);
    });

    document.getElementById('loadMore').style.display = 'block';
}

async function playVideo(videoId, thumbnail, title) {
    const modal = document.getElementById('videoModal');
    const loading = document.getElementById('videoLoading');
    const video = document.getElementById('videoPlayer');

    // Reset
    if (currentHls) {
        currentHls.destroy();
        currentHls = null;
    }
    video.pause();
    video.src = '';
    video.poster = thumbnail || '';
    loading.style.display = 'block';
    video.style.display = 'none';
    modal.style.display = 'flex';

    try {
        const res = await fetch(`/video/${videoId}`);
        const data = await res.json();

        if (data.error) {
            alert('Failed to load video: ' + data.error);
            closeModal();
            return;
        }

        loading.style.display = 'none';
        video.style.display = 'block';
        video.play();

        // HLS.js support
        if (Hls.isSupported()) {
            currentHls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90
            });
            currentHls.loadSource(data.stream_url);
            currentHls.attachMedia(video);
            currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = data.stream_url;
            video.addEventListener('loadedmetadata', () => {
                video.play();
            });
        } else {
            alert('HLS not supported in this browser');
            closeModal();
        }
    } catch (err) {
        console.error(err);
        alert('Error fetching video stream');
        closeModal();
    }
}

function closeModal() {
    const modal = document.getElementById('videoModal');
    const video = document.getElementById('videoPlayer');
    const loading = document.getElementById('videoLoading');

    if (currentHls) {
        currentHls.destroy();
        currentHls = null;
    }
    video.pause();
    video.src = '';
    modal.style.display = 'none';
    loading.style.display = 'none';
    video.style.display = 'none';
}

// ESC key close
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.getElementById('videoModal').style.display === 'flex') {
        closeModal();
    }
});
</script>

</body>
</html>
